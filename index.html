<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#102820" />
    <title>2026 新加坡親子旅行</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23102820'/%3E%3Cpath d='M16 39c10-17 22-17 32 0' fill='none' stroke='%23b8e1d0' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='26' r='8' fill='%23ff7d66'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css?v=20260510-thumbs" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-label="旅程摘要">
        <img
          class="hero__image"
          src="https://images.unsplash.com/photo-1525625293386-3f8f99389edd?auto=format&fit=crop&w=1200&q=84"
          alt="新加坡濱海灣天際線"
        />
        <div class="hero__shade"></div>
        <div class="hero__content">
          <p class="kicker">2026/8/15 - 8/19</p>
          <h1>新加坡5日遊</h1>
          <p class="hero__copy">市區夜景、室內避暑、動物園、聖淘沙與樟宜收尾，照顧 10-12 歲孩子的體力，也留給大人喘口氣。</p>
        </div>
      </section>


      <nav class="day-tabs" aria-label="每日行程切換"></nav>

      <section class="day-panel" aria-live="polite"></section>

      <section class="quick-tools" aria-label="旅行工具">
        <button class="tool is-active" data-view="summary">
          <i data-lucide="route"></i>
          <span>總覽</span>
        </button>
        <button class="tool" data-view="tickets">
          <i data-lucide="ticket"></i>
          <span>票券</span>
        </button>
        <button class="tool" data-view="packing">
          <i data-lucide="backpack"></i>
          <span>準備</span>
        </button>
      </section>

      <section class="info-panel" aria-live="polite"></section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js?v=20260510-thumbs"></script>
  </body>
</html>

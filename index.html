<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4F46E5" />
    <title>2026 新加坡親子旅行</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23102820'/%3E%3Cpath d='M16 39c10-17 22-17 32 0' fill='none' stroke='%23b8e1d0' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='26' r='8' fill='%23ff7d66'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260510-clean-banner" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header" aria-label="新加坡小旅行">
        <div class="brand-mark" aria-hidden="true">
          <i data-lucide="map"></i>
        </div>
        <strong>新加坡小旅行</strong>
      </header>

      <nav class="day-tabs" aria-label="每日行程切換"></nav>

      <section class="day-panel" aria-live="polite"></section>

      <section class="quick-tools" aria-label="旅行工具">
        <button class="tool is-active" data-view="summary">
          <i data-lucide="route"></i>
          <span>總覽</span>
        </button>
        <button class="tool" data-view="tickets">
          <i data-lucide="ticket"></i>
          <span>資訊</span>
        </button>
        <button class="tool" data-view="marina">
          <i data-lucide="landmark"></i>
          <span>濱海灣</span>
        </button>
        <button class="tool" data-view="airport">
          <i data-lucide="plane"></i>
          <span>機場</span>
        </button>
        <button class="tool" data-view="exchange">
          <i data-lucide="coins"></i>
          <span>匯率</span>
        </button>
      </section>

      <section class="info-panel" aria-live="polite"></section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./app.js?v=20260510-clean-banner"></script>
  </body>
</html>
